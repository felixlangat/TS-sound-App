<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ts Soundbar</title>
  <script type="module" crossorigin src="/TS-sound-App/assets/index-Bvfo9GMT.js"></script>
  <link rel="stylesheet" crossorigin href="/TS-sound-App/assets/index-Dx1O4QRl.css">
</head>
<body>
  <div class="app-shell">
    <div id="soundboard" class="board"></div>
    <aside class="volume-panel">
      <p class="volume-title">Volume</p>
      <input
        id="volume-slider"
        class="volume-slider"
        type="range"
        min="0"
        max="100"
        value="70"
        aria-label="Master volume"
      >
      <span id="volume-value" class="volume-value">70%</span>
    </aside>
  </div>
</body>
</html>
